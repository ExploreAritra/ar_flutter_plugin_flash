name: ar_flutter_plugin_flash
description: A Flutter plugin for Augmented Reality experiences with native flashlight support. Supports ARKit for iOS and ARCore for Android.
version: 1.1.5
homepage: https://xinix.tech/
repository: https://github.com/ExploreAritra/ar_flutter_plugin_flash

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^12.0.1
  vector_math: ^2.2.0
  json_annotation: ^4.9.0
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0 # Added to improve your pub.dev code score

flutter:
  # This section identifies this Flutter project as a plugin project.
  # We leave the native bindings pointing to the original class names
  # so you don't have to refactor the Kotlin/Swift file names!
  plugin:
    platforms:
      android:
        package: tech.graaf.franz.ar_flutter_plugin_plus
        pluginClass: ArFlutterPluginPlus
      ios:
        pluginClass: ArFlutterPluginPlus

  assets:
    - assets/image_unlit.filamat